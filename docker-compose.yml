version: '3.8'

services:

  mongo:
    image: mongo:6
    container_name: taskflow-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./backend
    container_name: taskflow-backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    depends_on:
      - mongo

  frontend:
    build: .
    container_name: taskflow-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongo-data: